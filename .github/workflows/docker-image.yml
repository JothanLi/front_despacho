name: Deploy Frontend

on:
  push:
    branches:
      - main
      - deploy

env:
  IMAGE_NAME: front-despacho

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create SSM parameters file
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os

          dockerhub_username = os.environ["DOCKERHUB_USERNAME"]
          dockerhub_token = os.environ["DOCKERHUB_TOKEN"]

          nginx_conf = """server {
              listen 8080;
              server_name _;

              root /usr/share/nginx/html;
              index index.html;

              location / {
                  try_files $uri /index.html;
              }

              location /api/v1/despachos {
                  proxy_pass http://10.0.2.49:8082/api/v1/despachos;
                  proxy_http_version 1.1;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /api/v1/ventas {
                  proxy_pass http://10.0.2.49:8083/api/v1/ventas;
                  proxy_http_version 1.1;

                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          """

          commands = [
              "sudo systemctl stop nginx || true",
              "sudo systemctl disable nginx || true",
              "cat > /home/ec2-user/nginx.conf <<'EOF'\n" + nginx_conf + "\nEOF",
              f"echo '{dockerhub_token}' | docker login -u '{dockerhub_username}' --password-stdin",
              f"docker pull {dockerhub_username}/front-despacho:latest",
              "docker rm -f front-despacho || true",
              f"docker run -d --name front-despacho --restart unless-stopped -p 80:8080 -v /home/ec2-user/nginx.conf:/etc/nginx/conf.d/default.conf {dockerhub_username}/front-despacho:latest",
              "docker image prune -f",
              "docker ps",
              "curl -s http://localhost/api/v1/despachos || true",
              "curl -s http://localhost/api/v1/ventas || true"
          ]

          with open("ssm-params.json", "w", encoding="utf-8") as f:
              json.dump({"commands": commands}, f)
          PY

      - name: Deploy to EC2 Frontend with SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Frontend Despacho" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output text